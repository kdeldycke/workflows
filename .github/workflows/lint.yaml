---
name: 🧹 Lint
"on":
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches-ignore:
      - prepare-release
      - renovate/**

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.event.head_commit.message, '[changelog] Release') }}

jobs:

  metadata:
    name: 🧬 Project metadata
    # All jobs depending on metadata in this workflow are skipped on prepare-release branch.
    if: github.head_ref != 'prepare-release'
    runs-on: ubuntu-slim
    outputs:
      metadata: ${{ steps.metadata.outputs.metadata }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v7.3.1
      - name: Run repomatic metadata
        id: metadata
        run: >
          uvx --no-progress --from . repomatic metadata
          --format github-json --output "$GITHUB_OUTPUT"
          is_bot python_files yaml_files workflow_files zsh_files
          is_python_project

  lint-repo:
    name: 🏠 Lint repo
    needs:
      - metadata
    if: fromJSON(needs.metadata.outputs.metadata).is_python_project
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v7.3.1
      - name: Lint repository metadata
        env:
          GH_TOKEN: ${{ github.token }}
        run: uvx --no-progress --from . repomatic lint-repo

  lint-types:
    name: 🛡️ Lint types
    needs:
      - metadata
    # Skip linting on prepare-release branch as it points to a tagged URL that does not exist yet.
    if: github.head_ref != 'prepare-release' && fromJSON(needs.metadata.outputs.metadata).python_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v7.3.1
      - name: Install all package dependencies
        # --all-extras and --all-groups are required as Mypy will check all Python files of the project, including
        # those related to optional features, tests, development and documentation.
        run: uv --no-progress sync --frozen --all-extras --all-groups
      - name: Run Mypy
        env:
          PYTHON_FILES: ${{ fromJSON(needs.metadata.outputs.metadata).python_files }}
        run: echo "${PYTHON_FILES}" | xargs uvx --no-progress --from . repomatic run mypy --

  lint-yaml:
    name: 📄 Lint YAML
    needs:
      - metadata
    # Skip linting on prepare-release branch as it points to a tagged URL that does not exist yet.
    # Also skip dependency update PRs which do not heavily alter YAML files.
    if: >
      github.head_ref != 'prepare-release'
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).yaml_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v7.3.1
      - name: Run yamllint
        run: uvx --no-progress --from . repomatic run yamllint -- .

  lint-zsh:
    name: 🐚 Lint Zsh
    needs:
      - metadata
    # Skip linting on prepare-release branch and bots PRs because they do not alter Zsh files.
    if: >
      github.head_ref != 'prepare-release'
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).zsh_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install Zsh
        run: |
          sudo apt update
          sudo apt install --yes zsh
      - name: Lint
        env:
          ZSH_FILES: ${{ fromJSON(needs.metadata.outputs.metadata).zsh_files }}
        run: echo "${ZSH_FILES}" | xargs -n1 zsh --no-exec

  lint-github-actions:
    name: ⚡ Lint GitHub Actions
    needs:
      - metadata
    # Skip linting on prepare-release branch and dependency update PRs because they do not heavily alter GitHub Actions.
    if: >
      github.head_ref != 'prepare-release'
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).workflow_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Install actionlint and shellcheck
        run: |
          curl -fsSL --output /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v1.7.11/actionlint_1.7.11_linux_amd64.tar.gz"
          echo "900919a84f2229bac68ca9cd4103ea297abc35e9689ebb842c6e34a3d1b01b0a  /tmp/actionlint.tar.gz" \
            | sha256sum --check
          tar xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
          sudo apt update
          sudo apt install --yes shellcheck
      - name: Setup problem matcher
        # Source: https://github.com/rhysd/actionlint/blob/main/docs/usage.md#problem-matchers
        run: |
          curl -fsSL --output ./.github/actionlint-matcher.json \
            https://raw.githubusercontent.com/rhysd/actionlint/refs/tags/v1.7.11/.github/actionlint-matcher.json
          echo "::add-matcher::.github/actionlint-matcher.json"
      - name: Run actionlint
        # XXX actionlint triggers this error:
        # .github/workflows/release.yaml:306:22: property "workflow_update_github_pat" is not defined in object type
        # {actions_runner_debug: string; actions_step_debug: string; github_token: string; pypi_token: string}
        # [expression]
        #     |
        # 306 | token: ${{ secrets.WORKFLOW_UPDATE_GITHUB_PAT || secrets.GITHUB_TOKEN }}
        #     |            ^~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
        # See: https://github.com/rhysd/actionlint/issues/148
        run: >
          actionlint -color
          -ignore 'property "workflow_update_github_pat" is not defined in .+'

  lint-workflow-security:
    name: 🔒 Lint workflow security
    needs:
      - metadata
    # Skip linting on prepare-release branch and dependency update PRs because they do not heavily alter GitHub Actions.
    if: >
      github.head_ref != 'prepare-release'
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
      && fromJSON(needs.metadata.outputs.metadata).workflow_files
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: astral-sh/setup-uv@v7.3.1
      - name: Run zizmor
        run: uvx --no-progress --from . repomatic run zizmor -- .

  lint-awesome:
    name: 🌟 Lint awesome
    # Lint only "awesome-*" repositories except "awesome-template".
    # Skip linting on prepare-release branch to align the condition with other jobs, even if it does not really matter
    # here as "awesome-*" repositories don't trigger the release workflow.
    if: >
      startsWith(github.event.repository.name, 'awesome-')
      && github.event.repository.name != 'awesome-template'
      && github.head_ref != 'prepare-release'
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Fetch all history to please linter's age checks.
          fetch-depth: 0
      - name: Install awesome-lint
        run: |
          npm install awesome-lint@2.2.3
          npx awesome-lint --version
      - name: Run awesome-lint
        run: npx awesome-lint

  lint-secrets:
    name: 🔐 Lint secrets
    needs:
      - metadata
    # Skip secret checks on prepare-release branch and dependency update PRs.
    if: github.head_ref != 'prepare-release' && ! fromJSON(needs.metadata.outputs.metadata).is_bot
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2.3.9
        with:
          config-path: .github/gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
