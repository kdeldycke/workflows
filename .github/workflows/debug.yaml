---
name: 🩺 Debug
"on":
  push:
    branches:
      - main
    paths:
      - .github/workflows/debug.yaml
  workflow_call:
  workflow_dispatch:
  schedule:
    # Run monthly on the 1st at 12:00 UTC to spot silent regressions.
    - cron: "0 12 1 * *"

permissions: {}

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number
      || github.ref
    }}
  cancel-in-progress: >-
    ${{ !startsWith(github.event.head_commit.message,
      '[changelog] Release') }}

jobs:

  metadata:
    name: 🧬 Project metadata
    runs-on: ubuntu-slim
    outputs:
      build_targets: ${{ steps.extend-matrix.outputs.targets }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Run repomatic metadata
        id: metadata
        run: >
          uvx --no-progress --from . repomatic --verbosity DEBUG metadata
          --format github-json --output "$GITHUB_OUTPUT"
          build_targets
      - name: Extend matrix with ubuntu-slim
        id: extend-matrix
        env:
          METADATA: ${{ steps.metadata.outputs.metadata }}
        run: |
          targets=$(echo "${METADATA}" | jq -c '(.build_targets | fromjson) + [{"os":"ubuntu-slim"}]')
          echo "targets=$targets" >> "$GITHUB_OUTPUT"

  dump-context:
    name: 🩺 ${{ matrix.os }} info dump
    needs:
      - metadata
    if: needs.metadata.outputs.build_targets
    strategy:
      matrix:
        include: ${{ fromJSON(needs.metadata.outputs.build_targets) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: crazy-max/ghaction-dump-context@5d2753e7076f4568c7729971e25231f32147e2d8 # v3.0.0
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - run: uvx --no-progress 'extra-platforms==11.0.3'