# Unsubscribes from notification threads of closed issues and pull requests.
# See repomatic/github/unsubscribe.py for rationale.
---
name: "\U0001F515 Unsubscribe closed threads"
"on":
  workflow_call:
    secrets:
      REPOMATIC_NOTIFICATIONS_PAT:
        required: false
  workflow_dispatch:
    inputs:
      months:
        description: "Unsubscribe from closed issues/PRs inactive for more than this many months"
        default: "3"
        type: string
      batch-size:
        description: "Max threads to inspect per run (backlog clears over successive runs)"
        default: "200"
        type: string
      dry-run:
        description: "Dry-run: only list candidates, do not perform unsubscribing"
        default: true
        type: boolean
  schedule:
    # Run weekly, every Monday at 9:13 UTC.
    - cron: "13 9 * * 1"

permissions: {}

jobs:

  unsubscribe-threads:
    # Skip schedule/dispatch triggers in the upstream repo. Downstream repos
    # call this via workflow_call, where github.repository is the caller.
    if: github.repository != 'kdeldycke/repomatic'
    name: "\U0001F515 Unsubscribe"
    runs-on: ubuntu-slim
    steps:
      # Only needed on the upstream repo to build from source (--from .).
      # Downstream thin callers point to a tagged release where the version
      # is frozen to a PyPI pin, so no checkout is required.
      - if: github.repository == 'kdeldycke/repomatic'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      - name: Unsubscribe from closed threads
        env:
          GH_TOKEN: ${{ secrets.REPOMATIC_NOTIFICATIONS_PAT }}
          MONTHS: ${{ inputs.months || '3' }}
          BATCH_SIZE: ${{ inputs.batch-size || '200' }}
        # Skip silently when REPOMATIC_NOTIFICATIONS_PAT is not configured.
        # GitHub Actions does not allow secrets.* in job-level if: conditions,
        # so the check is done here at step level via the env var.
        if: env.GH_TOKEN != ''
        run: >
          uvx --no-progress --from . repomatic
          unsubscribe-threads
          --months "$MONTHS"
          --batch-size "$BATCH_SIZE"
          ${{ github.event_name == 'workflow_dispatch'
          && inputs.dry-run != false
          && '--dry-run' || '--live' }}
          >> "$GITHUB_STEP_SUMMARY"
