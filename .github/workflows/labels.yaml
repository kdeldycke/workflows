---
name: 🏷️ Labels
"on":
  workflow_call:
  workflow_dispatch:
  push:
    branches:
      - main
  # Trigger labellers and sponsor tagger on PR open only to avoid excessive runs.
  pull_request:
    branches-ignore:
      - prepare-release
      - renovate/**
    types: [opened]
  # Trigger labellers and sponsor tagger on issue open only to avoid excessive runs.
  issues:
    types: [opened]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ !startsWith(github.event.head_commit.message, '[changelog] Release') }}

jobs:

  sync-labels:
    name: 🔄 Sync labels
    # Restrict job to the main branch pushes and workflow calls only, as this is a project-management task.
    if: github.event_name == 'push' || github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-slim
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/repomatic/bin
          key: repomatic-bin-${{ runner.os }}-${{ runner.arch }}-labelmaker-${{ hashFiles('repomatic/tool_runner.py') }}
          restore-keys: |
            repomatic-bin-${{ runner.os }}-${{ runner.arch }}-labelmaker-
      - name: Sync labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: uvx --no-progress 'repomatic==6.18.0' sync-labels

  metadata:
    name: 🧬 Project metadata
    # All jobs depending on metadata in this workflow are skipped on prepare-release branch.
    if: github.head_ref != 'prepare-release'
    runs-on: ubuntu-slim
    outputs:
      metadata: ${{ steps.metadata.outputs.metadata }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Run repomatic metadata
        id: metadata
        run: >
          uvx --no-progress 'repomatic==6.18.0' metadata
          --format github-json --output "$GITHUB_OUTPUT"
          is_bot

  file-labeller:
    name: 📁 File-based PR labeller
    needs:
      - metadata
    if: >
      github.event_name == 'pull_request'
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Dump default rules
        run: uvx --no-progress 'repomatic==6.18.0' init labels
      - name: Apply rules
        uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
        with:
          configuration-path: ".github/labeller-file-based.yaml"

  content-labeller:
    name: 📝 Content-based labeller
    needs:
      - metadata
    if: >
      (github.event_name == 'pull_request' || github.event_name == 'issues')
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Dump default rules
        run: uvx --no-progress 'repomatic==6.18.0' init labels
      - name: Apply rules
        uses: github/issue-labeler@c1b0f9f52a63158c4adc09425e858e87b32e9685 # v3.4
        with:
          configuration-path: ".github/labeller-content-based.yaml"
          enable-versioned-regex: 0
          include-title: 1

  sponsor-labeller:
    name: 💝 Tag sponsors
    needs:
      - metadata
    if: >
      (github.event_name == 'pull_request' || github.event_name == 'issues')
      && (! fromJSON(needs.metadata.outputs.metadata).is_bot)
    runs-on: ubuntu-slim
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Add sponsor label
        env:
          GH_TOKEN: ${{ github.token }}
        run: uvx --no-progress 'repomatic==6.18.0' sponsor-label
