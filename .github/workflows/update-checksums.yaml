---
# Work around https://github.com/renovatebot/renovate/discussions/42263
# Renovate's postUpgradeTasks silently drops file changes when modifying
# the same file the regex manager already updated. The tool registry
# checksum rule (renovate.json5) targets repomatic/tool_runner.py for
# both the version bump and the checksum update, so the checksum write
# is lost. This workflow runs after Renovate's push, downloads the new
# binaries, and commits the correct hashes to the PR branch.
#
# This workflow is repomatic-internal: it patches repomatic/tool_runner.py
# which only exists in this repo. It is intentionally excluded from the
# downstream workflow registry in registry.py.
name: 🔄 Update checksums
"on":
  push:
    branches:
      - "renovate/**"
    paths:
      - "repomatic/tool_runner.py"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  update-checksums:
    name: 🔄 Update checksums
    runs-on: ubuntu-slim
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Push with REPOMATIC_PAT so the fix commit triggers CI checks
          # on the updated PR branch. The resulting push re-triggers this
          # workflow, but update-checksums finds no stale hashes and
          # git diff --quiet exits cleanly: no infinite loop.
          token: ${{ secrets.REPOMATIC_PAT || secrets.GITHUB_TOKEN }}
      - uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a # v7.4.0
      - name: Update stale registry checksums
        # Must use `uv run` (not `uvx --from .`). uvx builds an isolated
        # wheel where __file__ points to a temp site-packages path, so
        # update-checksums writes the new hashes there instead of the git
        # working tree. `uv run` installs in editable mode: __file__
        # resolves to the checkout, and git diff can see the changes.
        # No version pin needed: the workflow runs on this repo's own
        # source, so the CLI version is always the checked-out commit.
        run: uv --no-progress run --frozen -- repomatic update-checksums --registry
      - name: Commit and push if changed
        run: |
          git diff --quiet repomatic/tool_runner.py && exit 0
          git config user.name "$(git log -1 --format='%cn')"
          git config user.email "$(git log -1 --format='%ce')"
          git add repomatic/tool_runner.py
          git commit -m 'Update tool registry checksums'
          git push
